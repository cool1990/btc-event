<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BTC 大事件图谱</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--s1:#161b27;--s2:#1c2235;--s3:#232d42;--s4:#2a3347;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.10);
  --tx:#e2e8f0;--t2:#64748b;--t3:#2d3a52;
  --gr:#22c55e;--rd:#ef4444;--or:#f7931a;
  --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--sans);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;padding:14px 16px 12px;gap:9px}

.hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sym{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sym b{color:var(--or)}
.chip{font-size:10px;background:var(--s2);border:1px solid var(--b2);border-radius:4px;padding:2px 8px;color:var(--t2);font-family:var(--mono)}
.hdr-r{font-size:10px;color:var(--t2);font-family:var(--mono)}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;flex-shrink:0}
.st{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:10px 13px}
.st-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.st-v{font-size:16px;font-weight:600;font-family:var(--mono)}
.up{color:var(--gr)} .dn{color:var(--rd)}

/* filter bar */
.ctrl{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:8px 14px;flex-shrink:0;flex-wrap:wrap}
.filter-block{display:flex;align-items:center;border-radius:7px;overflow:hidden;border:1.5px solid transparent;transition:border-color .15s,opacity .15s}
.filter-block.active-up{border-color:rgba(34,197,94,.4)}
.filter-block.active-dn{border-color:rgba(239,68,68,.4)}
.filter-block.inactive{border-color:var(--b1);opacity:.45}
.f-toggle{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;background:var(--s2);font-size:12px;transition:background .12s;white-space:nowrap;user-select:none}
.f-toggle:hover{background:var(--s3)}
.f-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-block.active-up .f-toggle{color:var(--gr)}
.filter-block.active-dn .f-toggle{color:var(--rd)}
.filter-block.inactive .f-toggle{color:var(--t2)}
.f-input-wrap{display:flex;align-items:center;gap:4px;padding:0 10px;background:var(--s3);height:100%;font-size:12px;color:var(--t2)}
.f-num{width:52px;background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--tx);font-size:12px;font-family:var(--mono);outline:none;text-align:center;padding:1px 2px;-moz-appearance:textfield}
.f-num::-webkit-outer-spin-button,.f-num::-webkit-inner-spin-button{-webkit-appearance:none}
.filter-block.active-up .f-num{border-bottom-color:rgba(34,197,94,.4)}
.filter-block.active-dn .f-num{border-bottom-color:rgba(239,68,68,.4)}
.ctrl-sep{width:1px;height:22px;background:var(--b1);flex-shrink:0}
.abtn{background:var(--or);border:none;border-radius:6px;padding:6px 16px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.abtn:hover{opacity:.85}
.leg{display:flex;align-items:center;gap:12px;margin-left:auto}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.ld{width:8px;height:8px;border-radius:50%}
.cnt-badge{font-size:11px;font-family:var(--mono);color:var(--or);background:rgba(247,147,26,.1);border:1px solid rgba(247,147,26,.2);border-radius:4px;padding:2px 9px;white-space:nowrap}

/* body */
.body{display:flex;flex:1;gap:9px;min-height:0}
#charts-col{flex:1;display:flex;flex-direction:column;min-width:0;gap:0}
#echarts-wrap{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:9px;overflow:hidden;min-height:560px}
#main-chart{width:100%;height:100%;min-height:560px}

/* ── side panel ── */
#panel{
  width:280px;flex-shrink:0;
  background:var(--s1);border:1px solid var(--b1);border-radius:9px;
  overflow-y:auto;display:flex;flex-direction:column;
}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

/* 空状态 */
.ph{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:24px;text-align:center;
}
.ph-icon{font-size:22px;opacity:.18}
.ph p{font-size:12px;color:var(--t2);line-height:1.9}

/* 详情卡片 */
.pc{padding:0;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* 顶部：日期 + 涨跌幅 */
.pc-head{
  padding:16px 16px 14px;
  border-bottom:1px solid var(--b1);
}
.pc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pc-date{font-size:11px;font-family:var(--mono);color:var(--t2)}
.pc-dir{
  font-size:10px;padding:2px 9px;border-radius:4px;font-weight:600;
  letter-spacing:.3px;text-transform:uppercase;
}
.pc-dir.up{background:rgba(34,197,94,.12);color:var(--gr)}
.pc-dir.dn{background:rgba(239,68,68,.12);color:var(--rd)}
.pc-pct{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:2px}
.pc-abs{font-size:12px;color:var(--t2);font-family:var(--mono)}

/* 成交量行 */
.pc-vol{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--b1);
  border-bottom:1px solid var(--b1);
}
.oc{background:var(--s1);padding:11px 14px}
.oc-l{font-size:10px;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.oc-v{font-size:14px;font-family:var(--mono);font-weight:500}

/* 事件区 */
.pc-event{padding:16px 16px}
.pe-label{
  font-size:13px;font-weight:600;letter-spacing:.2px;
  color:var(--tx);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.pe-label::after{content:'';flex:1;height:1px;background:var(--b2)}
/* 有事件 */
.pe-card{
  background:var(--s2);border-radius:8px;padding:12px 13px;
  border-left:3px solid transparent;
}
.pe-card.bullish{border-left-color:var(--gr)}
.pe-card.bearish{border-left-color:var(--rd)}
.pe-card.neutral{border-left-color:var(--or)}
.pe-cat{
  display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;
  margin-bottom:7px;font-weight:500;
}
.pe-card.bullish .pe-cat{background:rgba(34,197,94,.12);color:var(--gr)}
.pe-card.bearish .pe-cat{background:rgba(239,68,68,.12);color:var(--rd)}
.pe-card.neutral .pe-cat{background:rgba(247,147,26,.12);color:var(--or)}
.pe-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:7px;line-height:1.45}
.pe-body{font-size:12px;color:#7d8fa8;line-height:1.75}
/* 无事件 */
.pe-empty{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:8px;
  background:var(--s2);border:1px dashed var(--b2);
}
.pe-empty-icon{font-size:14px;opacity:.3;flex-shrink:0}
.pe-empty p{font-size:11px;color:var(--t3);line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="sym">BTC<b>/</b>USDT</span>
      <span class="chip">日线</span>
      <span class="chip">2017-08-17 → 2026-04-04</span>
    </div>
    <span class="hdr-r">Binance · 3153 根 K 线</span>
  </div>

  <div class="stats">
    <div class="st"><div class="st-l">最新收盘</div><div class="st-v" id="s-last">—</div></div>
    <div class="st"><div class="st-l">历史最高</div><div class="st-v up" id="s-high">—</div></div>
    <div class="st"><div class="st-l">历史最低</div><div class="st-v dn" id="s-low">—</div></div>
    <div class="st"><div class="st-l">总涨幅</div><div class="st-v up" id="s-chg">—</div></div>
    <div class="st"><div class="st-l">当前标注</div><div class="st-v" id="s-cnt">—</div></div>
  </div>

  <div class="ctrl">
    <div class="filter-block active-up" id="blockUp">
      <div class="f-toggle" onclick="toggleDir('up')">
        <div class="f-dot" style="background:var(--gr)"></div>
        <span>涨幅 ≥</span>
      </div>
      <div class="f-input-wrap">
        <input class="f-num" id="upVal" type="number" value="5" min="0.1" max="100" step="0.5"
               placeholder="关闭" oninput="onInputChange()" onkeydown="if(event.key==='Enter')applyFilter()">
        <span>%</span>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="filter-block active-dn" id="blockDn">
      <div class="f-toggle" onclick="toggleDir('dn')">
        <div class="f-dot" style="background:var(--rd)"></div>
        <span>跌幅 ≥</span>
      </div>
      <div class="f-input-wrap">
        <input class="f-num" id="dnVal" type="number" value="5" min="0.1" max="100" step="0.5"
               placeholder="关闭" oninput="onInputChange()" onkeydown="if(event.key==='Enter')applyFilter()">
        <span>%</span>
      </div>
    </div>
    <button class="abtn" onclick="applyFilter()">应用</button>
    <div class="leg">
      <div class="li"><div class="ld" style="background:var(--gr)"></div>大涨</div>
      <div class="li"><div class="ld" style="background:var(--rd)"></div>大跌</div>
    </div>
    <span class="cnt-badge" id="cntBadge">— 个标注</span>
  </div>

  <div class="body">
    <div id="charts-col">
      <div id="echarts-wrap"><div id="main-chart"></div></div>
    </div>
    <div id="panel">
      <div class="ph">
        <div class="ph-icon">◎</div>
        <p>点击图表上的<br><span style="color:var(--gr)">●&nbsp;绿色</span> / <span style="color:var(--rd)">●&nbsp;红色</span> 标记<br>查看当日详情</p>
      </div>
    </div>
  </div>
</div>

<script>
let PRICE = [];
let EVENTS = [];

const fmt  = (n,d=0) => Number(n).toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d});
const fmtV = v => v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':''+Math.round(v);
const pct  = (a,b) => (b-a)/a*100;
function tsToDate(ts){
  const d=new Date(ts*1000);
  return d.getUTCFullYear()+'-'+('0'+(d.getUTCMonth()+1)).slice(-2)+'-'+('0'+d.getUTCDate()).slice(-2);
}

const EVENT_MAP = {};

function parseTimeToUnix(t) {
  if (typeof t === 'number' && !isNaN(t)) return t;
  const s = String(t);
  const ms = Date.parse(s.length === 10 ? s + 'T00:00:00Z' : s);
  return Math.floor(ms / 1000);
}

function normalizePriceRows(rows) {
  return rows
    .map((r) => ({
      time: parseTimeToUnix(r.time),
      open: +r.open,
      high: +r.high,
      low: +r.low,
      close: +r.close,
      volume: +r.volume,
    }))
    .sort((a, b) => a.time - b.time);
}

async function loadData() {
  const [priceRes, eventsRes] = await Promise.all([
    fetch('btc_price_data.json'),
    fetch('btc_events.json'),
  ]);
  if (!priceRes.ok) throw new Error('btc_price_data.json HTTP ' + priceRes.status);
  if (!eventsRes.ok) throw new Error('btc_events.json HTTP ' + eventsRes.status);
  const priceRaw = await priceRes.json();
  const eventsRaw = await eventsRes.json();
  PRICE = normalizePriceRows(priceRaw);
  EVENTS = eventsRaw;
  for (const k in EVENT_MAP) delete EVENT_MAP[k];
  EVENTS.forEach((ev) => { EVENT_MAP[ev.date] = ev; });
  const last = PRICE[PRICE.length - 1];
  document.getElementById('s-last').textContent = '$' + fmt(last.close);
  document.getElementById('s-high').textContent = '$' + fmt(Math.max(...PRICE.map((c) => c.high)));
  document.getElementById('s-low').textContent = '$' + fmt(Math.min(...PRICE.map((c) => c.low)));
  const chg = pct(PRICE[0].close, last.close);
  document.getElementById('s-chg').textContent = (chg > 0 ? '+' : '') + chg.toFixed(1) + '%';
}


// ── filter state ─────────────────────────────────────────────────
function getState(){
  const uRaw=document.getElementById('upVal').value.trim();
  const dRaw=document.getElementById('dnVal').value.trim();
  const u=parseFloat(uRaw), d=parseFloat(dRaw);
  return {
    upOn: uRaw!==''&&!isNaN(u)&&u>0,
    dnOn: dRaw!==''&&!isNaN(d)&&d>0,
    up:   (!isNaN(u)&&u>0)?u:null,
    dn:   (!isNaN(d)&&d>0)?d:null,
  };
}
function refreshStyle(){
  const {upOn,dnOn}=getState();
  document.getElementById('blockUp').className='filter-block '+(upOn?'active-up':'inactive');
  document.getElementById('blockDn').className='filter-block '+(dnOn?'active-dn':'inactive');
}
function onInputChange(){ refreshStyle(); }
function toggleDir(dir){
  const id=dir==='up'?'upVal':'dnVal';
  const inp=document.getElementById(id);
  if(inp.value.trim()===''||parseFloat(inp.value)<=0) inp.value='5';
  else inp.value='';
  refreshStyle(); applyFilter();
}

// ── 指标计算 & ECharts ─────────────────────────────────────────
/** N 日简单移动平均线（收盘价），前 N-1 根为 null */
function sma(values, period) {
  const out = new Array(values.length).fill(null);
  if (period <= 0 || values.length < period) return out;
  let sum = 0;
  for (let i = 0; i < values.length; i++) {
    sum += values[i];
    if (i >= period) sum -= values[i - period];
    if (i >= period - 1) out[i] = sum / period;
  }
  return out;
}

/** Wilder RSI（默认周期 14），前 period 根为 null */
function rsiWilder(closes, period) {
  const n = closes.length;
  const out = new Array(n).fill(null);
  if (n < period + 1) return out;
  let avgG = 0;
  let avgL = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d >= 0) avgG += d;
    else avgL -= d;
  }
  avgG /= period;
  avgL /= period;
  const rs0 = avgL === 0 ? Infinity : avgG / avgL;
  out[period] = 100 - 100 / (1 + rs0);
  for (let i = period + 1; i < n; i++) {
    const d = closes[i] - closes[i - 1];
    const g = d > 0 ? d : 0;
    const l = d < 0 ? -d : 0;
    avgG = (avgG * (period - 1) + g) / period;
    avgL = (avgL * (period - 1) + l) / period;
    const rs = avgL === 0 ? Infinity : avgG / avgL;
    out[i] = 100 - 100 / (1 + rs);
  }
  return out;
}

async function fetchFearGreedByDate() {
  const map = Object.create(null);
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=4000');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    for (const row of j.data) {
      const ts = parseInt(row.timestamp, 10);
      map[tsToDate(ts)] = +row.value;
    }
  } catch (e) {
    console.warn('恐惧与贪婪指数拉取失败（副图将留空）', e);
  }
  return map;
}

function waitEcharts(cb, n) {
  n = n || 0;
  if (typeof echarts !== 'undefined') {
    cb();
    return;
  }
  if (n > 80) return;
  setTimeout(() => waitEcharts(cb, n + 1), 100);
}

loadData().then(() => {
waitEcharts(() => {
  const chartEl = document.getElementById('main-chart');
  const chart = echarts.init(chartEl, null, { renderer: 'canvas' });

  const dates = PRICE.map((c) => tsToDate(c.time));
  const ohlc = PRICE.map((c) => [c.open, c.close, c.low, c.high]);
  const closes = PRICE.map((c) => c.close);
  const ma365 = sma(closes, 365);
  const rsi14 = rsiWilder(closes, 14);

  const axisLbl = { color: '#64748b', fontSize: 10 };
  const xAxis = [0, 1].map((gi, idx) => ({
    type: 'category',
    gridIndex: gi,
    data: dates,
    boundaryGap: true,
    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: Object.assign({}, axisLbl, { show: idx === 1 }),
    axisPointer: { show: true },
  }));

  function buildMarkerData() {
    const { upOn, dnOn, up, dn } = getState();
    const pts = [];
    if (!upOn && !dnOn) return { pts, cnt: 0 };
    let cnt = 0;
    for (let i = 1; i < PRICE.length; i++) {
      const c = PRICE[i];
      const prev = PRICE[i - 1];
      const dp = pct(prev.close, c.close);
      const hitUp = upOn && up !== null && dp >= up;
      const hitDn = dnOn && dn !== null && dp <= -dn;
      if (!hitUp && !hitDn) continue;
      cnt++;
      pts.push({
        value: [dates[i], c.high * 1.012],
        itemStyle: { color: hitUp ? '#22c55e' : '#ef4444' },
        symbolSize: 8,
      });
    }
    return { pts, cnt };
  }

  function buildMarkers() {
    const { pts, cnt } = buildMarkerData();
    document.getElementById('s-cnt').textContent = cnt + ' 天';
    document.getElementById('cntBadge').textContent = cnt + ' 个标注';
    chart.setOption({ series: [{}, {}, { data: pts }] }, false, true);
  }
  window._buildMarkers = buildMarkers;

  function showPanel(date,c,prev,dp){
    const isUp=dp>0;
    const sign=dp>=0?'+':'';
    const col=isUp?'var(--gr)':'var(--rd)';
    const absDp=Math.abs(dp);

    // 收盘价变化（绝对值）
    const absChg=Math.abs(c.close-prev.close);

    // 近7日范围
    const idx=PRICE.findIndex(x=>x.time===c.time);
    const w=PRICE.slice(Math.max(0,idx-6),idx+1);
    const wH=Math.max(...w.map(x=>x.high));
    const wL=Math.min(...w.map(x=>x.low));
    const volChg=prev.volume>0?pct(prev.volume,c.volume):0;

    // 事件
    const ev=EVENT_MAP[date];
    let eventHtml='';
    if(ev){
      const lbl={bullish:'利多',bearish:'利空',neutral:'中性'}[ev.type]||'';
      eventHtml=`
      <div class="pe-card ${ev.type}">
        <span class="pe-cat">${ev.category}　${lbl}</span>
        <div class="pe-title">${ev.title}</div>
        <div class="pe-body">${ev.content}</div>
      </div>`;
    } else {
      eventHtml=`
      <div class="pe-empty">
        <div class="pe-empty-icon">○</div>
        <p>暂无事件记录<br>可在 btc_events.json 中补充</p>
      </div>`;
    }

    document.getElementById('panel').innerHTML=`
    <div class="pc">

      <!-- 顶部：日期 + 涨跌幅 -->
      <div class="pc-head">
        <div class="pc-meta">
          <span class="pc-date">${date}</span>
          <span class="pc-dir ${isUp?'up':'dn'}">${isUp?'大涨':'大跌'}</span>
        </div>
        <div class="pc-pct" style="color:${col}">${sign}${dp.toFixed(2)}%</div>
        <div class="pc-abs" style="color:${col}">$${fmt(prev.close)} → $${fmt(c.close)}</div>
      </div>

      <!-- 成交量 -->
      <div class="pc-vol">
        <div class="oc">
          <div class="oc-l">成交量</div>
          <div class="oc-v">${fmtV(c.volume)} BTC</div>
        </div>
        <div class="oc">
          <div class="oc-l">量变化</div>
          <div class="oc-v" style="color:${volChg>=0?'var(--gr)':'var(--rd)'}">${volChg>=0?'+':''}${volChg.toFixed(1)}%</div>
        </div>
      </div>

      <!-- 事件区 -->
      <div class="pc-event">
        <div class="pe-label">大事件</div>
        ${eventHtml}
      </div>

    </div>`;
  }


  fetchFearGreedByDate().then((fngMap) => {
    const fngSeries = dates.map((d) => (fngMap[d] != null ? fngMap[d] : null));

    const option = {
      backgroundColor: '#161b27',
      animation: false,
      legend: {
        top: 4,
        left: 48,
        textStyle: { color: '#94a3b8', fontSize: 11 },
        data: ['K线', 'MA365', 'RSI(14)', '恐惧贪婪'],
      },
      axisPointer: {
        link: [{ xAxisIndex: [0, 1] }],
        label: { backgroundColor: '#2a3347' },
      },
      grid: [
        { left: 52, right: 72, top: '10%', height: '60%' },
        { left: 52, right: 72, top: '74%', height: '14%' },
      ],
      xAxis,
      yAxis: [
        {
          gridIndex: 0,
          scale: true,
          splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } },
          axisLabel: { color: '#64748b', fontSize: 10 },
        },
        {
          gridIndex: 1,
          min: 0,
          max: 100,
          splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } },
          axisLabel: { color: '#64748b', fontSize: 10 },
        },
        {
          gridIndex: 0,
          min: 0,
          max: 100,
          position: 'right',
          splitLine: { show: false },
          axisLabel: { color: '#f472b6', fontSize: 10 },
          axisLine: { lineStyle: { color: 'rgba(244,114,182,0.3)' } },
          name: 'F&G',
          nameTextStyle: { color: '#f472b6', fontSize: 10 },
          nameLocation: 'end',
        },
      ],
      dataZoom: [
        {
          type: 'inside',
          xAxisIndex: [0, 1],
          start: 72,
          end: 100,
        },
        {
          type: 'slider',
          xAxisIndex: [0, 1],
          bottom: 6,
          height: 18,
          borderColor: 'rgba(255,255,255,0.08)',
          fillerColor: 'rgba(247,147,26,0.15)',
          handleStyle: { color: '#f7931a' },
          textStyle: { color: '#64748b', fontSize: 10 },
        },
      ],
      series: [
        {
          name: 'K线',
          type: 'candlestick',
          xAxisIndex: 0,
          yAxisIndex: 0,
          data: ohlc,
          itemStyle: {
            color: '#26a69a',
            color0: '#ef5350',
            borderColor: '#26a69a',
            borderColor0: '#ef5350',
          },
        },
        {
          name: 'MA365',
          type: 'line',
          xAxisIndex: 0,
          yAxisIndex: 0,
          data: ma365,
          showSymbol: false,
          lineStyle: { width: 1.4, color: '#f7931a' },
          connectNulls: false,
        },
        {
          name: '标注',
          type: 'scatter',
          xAxisIndex: 0,
          yAxisIndex: 0,
          data: [],
          z: 10,
        },
        {
          name: 'RSI(14)',
          type: 'line',
          xAxisIndex: 1,
          yAxisIndex: 1,
          data: rsi14,
          showSymbol: false,
          lineStyle: { width: 1.2, color: '#818cf8' },
          markLine: {
            silent: true,
            symbol: 'none',
            lineStyle: { type: 'dashed', color: 'rgba(255,255,255,0.15)' },
            data: [{ yAxis: 30 }, { yAxis: 70 }],
          },
        },
        {
          name: '恐惧贪婪',
          type: 'line',
          xAxisIndex: 0,
          yAxisIndex: 2,
          data: fngSeries,
          showSymbol: false,
          lineStyle: { width: 1.2, color: '#f472b6' },
          areaStyle: { color: 'rgba(244,114,182,0.08)' },
          connectNulls: true,
          z: 1,
        },
      ],
    };

    chart.setOption(option);
    buildMarkers();

    chart.on('click', (p) => {
      if (p.seriesType !== 'candlestick' || p.dataIndex == null) return;
      const idx = p.dataIndex;
      if (idx < 1) return;
      const c = PRICE[idx];
      const prev = PRICE[idx - 1];
      const dp = pct(prev.close, c.close);
      const { upOn, dnOn, up, dn } = getState();
      const hitUp = upOn && up !== null && dp >= up;
      const hitDn = dnOn && dn !== null && dp <= -dn;
      if (!hitUp && !hitDn) return;
      showPanel(dates[idx], c, prev, dp);
    });

    new ResizeObserver(() => chart.resize()).observe(chartEl.parentElement);
  });
});
}).catch((e) => {
  console.error(e);
  document.body.insertAdjacentHTML('afterbegin', '<div style="padding:16px;background:#3f1d1d;color:#fca5a5;font-family:sans-serif;">加载数据失败: ' + (e && e.message ? e.message : e) + '</div>');
});

function applyFilter(){
  refreshStyle();
  if(window._buildMarkers) window._buildMarkers();
}
